<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="100%" height="100%">
  <!-- Background -->
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#010129" />
      <stop offset="100%" stop-color="#05051a" />
    </linearGradient>

    <!-- Accent Gradient for Tech Elements -->
    <linearGradient id="accent-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0052FF" stop-opacity="0.8" />
      <stop offset="50%" stop-color="#00D4FF" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#010129" stop-opacity="0" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Text Glow Filter -->
    <filter id="text-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Base Background -->
  <rect width="1200" height="300" fill="url(#bg-gradient)" />

  <!-- Tech Grid Overlay (Subtle) -->
  <g stroke="#00D4FF" stroke-opacity="0.06" stroke-width="1">
    <path d="M 0,50 L 1200,50 M 0,100 L 1200,100 M 0,150 L 1200,150 M 0,200 L 1200,200 M 0,250 L 1200,250" />
    <path d="M 100,0 L 100,300 M 200,0 L 200,300 M 300,0 L 300,300 M 400,0 L 400,300 M 500,0 L 500,300 M 600,0 L 600,300 M 700,0 L 700,300 M 800,0 L 800,300 M 900,0 L 900,300 M 1000,0 L 1000,300 M 1100,0 L 1100,300" />
  </g>

  <!-- Glowing tech curves/flows on the right -->
  <g filter="url(#glow)">
    <!-- Main wave -->
    <path d="M 700,300 Q 850,150 950,200 T 1200,50 L 1200,300 Z" fill="url(#accent-gradient)" />
    <!-- Secondary accent line -->
    <path d="M 650,300 Q 800,120 980,140 T 1200,-10" fill="none" stroke="#00D4FF" stroke-opacity="0.4" stroke-width="2" />
    <path d="M 750,320 Q 900,180 1020,180 T 1200,100" fill="none" stroke="#0052FF" stroke-opacity="0.3" stroke-width="1.5" />
  </g>

  <!-- Tech nodes/points on the right -->
  <g fill="#00D4FF" opacity="0.6">
    <circle cx="850" cy="180" r="3" />
    <circle cx="950" cy="200" r="4.5" filter="url(#glow)" />
    <circle cx="1080" cy="115" r="2.5" />
    <circle cx="1120" cy="70" r="3.5" />
    
    <!-- Connection lines -->
    <line x1="850" y1="180" x2="950" y2="200" stroke="#00D4FF" stroke-opacity="0.2" stroke-width="1" />
    <line x1="950" y1="200" x2="1080" y2="115" stroke="#00D4FF" stroke-opacity="0.2" stroke-width="1" />
    <line x1="1080" y1="115" x2="1120" y2="70" stroke="#00D4FF" stroke-opacity="0.2" stroke-width="1" />
  </g>

  <!-- Typography (Left aligned, clean hierarchy) -->
  <!-- Name -->
  <text x="80" y="125" fill="#ffffff" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="44" font-weight="800" letter-spacing="-1.5px">MARCO GALVÃO</text>
  
  <!-- Role -->
  <text x="80" y="168" fill="#00D4FF" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="1px" filter="url(#text-glow)">FULL STACK DEVELOPER @ MYTRUS</text>
  
  <!-- Core Pillars -->
  <text x="80" y="215" fill="#8B9BB4" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" font-weight="600" letter-spacing="2px">PERFORMANCE • AUTOMAÇÃO • CONVERSÃO</text>

  <!-- Small geometric accent on text start -->
  <rect x="55" y="90" width="4" height="135" rx="2" fill="#00D4FF" filter="url(#text-glow)" />
</svg>
